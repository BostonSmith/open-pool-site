name: heartbeat

# Lives in the PUBLIC repo purely to tick. The private repo's own scheduler
# has never fired (0 scheduled runs across two cron styles), so this repo
# relays the beat via workflow_dispatch. The private build's gate enforces
# play hours and freshness, so extra beats are always safe.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Relay to the pool build
        env:
          RELAY_TOKEN: ${{ secrets.RELAY_TOKEN }}
        run: |
          curl -s -o /dev/null -w "dispatch: %{http_code}\n" -X POST \
            -H "Authorization: Bearer $RELAY_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/open-pool/actions/workflows/update.yml/dispatches \
            -d '{"ref":"main","inputs":{"source":"relay"}}'
